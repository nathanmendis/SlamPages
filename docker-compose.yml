version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: slambook-db
    restart: always
    environment:
      POSTGRES_DB: slambook
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: slambook-redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: ./Backend
    container_name: slambook-api
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./Backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/slambook
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery:
    build: ./Backend
    container_name: slambook-celery
    restart: always
    command: celery -A slam worker -l info
    volumes:
      - ./Backend:/app
      - media_data:/app/media
    env_file:
      - ./Backend/.env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/slambook
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  media_data:
